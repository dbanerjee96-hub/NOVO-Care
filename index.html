    <link rel="stylesheet" href="./output/style.css">

<body>

    <!-- Header Starts -->
    <header class="absolute top-0 left-0 w-full z-50">
        <div class="container w-full">
            <nav class="flex items-center">

                <div class="nav-logo w-24 md:w-32 lg:w-40 xl:w-75 shrink-0">
                    <a href="index.html"><img src="./assets/Group 5.png" alt="logo"></a>
                </div>

                <div class="menu md:hidden">
                    <span></span>
                </div>

                <div class="navbar-collapse hidden md:flex items-center flex-1">

                    <ul class="flex items-center gap-1 lg:gap-4 xl:gap-8 mx-auto">
                        <li><a class="nav-link active md:px-3 lg:px-5 whitespace-nowrap" href="#">Home</a></li>
                        <li><a class="nav-link md:px-3 lg:px-5 whitespace-nowrap" href="services.html">Services</a></li>
                        <li><a class="nav-link md:px-3 lg:px-5 whitespace-nowrap" href="team.html">Team</a></li>
                        <li><a class="nav-link md:px-3 lg:px-5 whitespace-nowrap"
                                href="subscriptions.html">Subscriptions</a></li>
                        <li><a class="nav-link md:px-3 lg:px-5 whitespace-nowrap" href="contact.html">Contact Us</a>

                    </ul>

                    <div class="flex items-center gap-2 lg:gap-4 xl:gap-6 shrink-0 ms-auto">
                        <div class="phone cursor-pointer">
                            <img src="./assets/phone.png" alt="phone" class="w-5 lg:w-10">
                        </div>

                        <div class="navbar-btn shrink-0">
                            <a class="btn-primary whitespace-nowrap text-xs xl:text-base md:px-4 md:py-3 lg:px-7.5 lg:py-5"

                                Appointment</a>

                </div>

    <!-- Header Ends -->

    <main>

        <!-- Banner Starts -->

        <section class="banner-section h-screen flex items-end relative z-0 overflow-hidden">
            <div class="container">
                <div class="banner-content">
                    <h1
                        class="title1 font-play text-4xl sm:text-5xl md:text-6xl lg:text-7xl xl:text-[100px] 3xl:text-[132px] font-medium text-center text-[#01797E] text-stroke tracking-[10%] mb-37.5">
                        Your
                        Smile, Our Priority</h1>
                    <div
                        class="banner-box flex justify-between bg-linear-to-r from-[#01787D] to-[#00B9B6] rounded-[40px] pt-60 pb-8.75 px-8.75 relative">
                        <div class="banner-box-cnt">
                            <p class="banr-desc font-mont mb-13.5 max-w-90 text-[#ffffff]">
                                Professional dental care with regular check-ups and advanced treatments
                            </p>
                            <div class="banner-btns gap-10 flex items-center">
                                <div class="banner-pri-btn">
                                    <a class="btn-primary" href="">Book Appointment</a>
                                </div>
                                <div class="banner-snd-btn">
                                    <a class="btn-secondary" href="#">View Subscriptions</a>
                                </div>
                            </div>
                        </div>
                        <div class="doctor-img absolute bottom-0 left-1/2 -translate-x-1/2">

                            <p class="max-w-[250px] font-mont text-lg text-[#01797E]">average patient rating based on
                                over 1300 verified reviews on google</p>
                            <div
                                class="circle-arrow w-[70px] h-[70px] bg-[#DBFFFF] rounded-full flex items-center justify-center absolute -top-2 -right-4">
                                <img src="./assets/Vector.png" alt="right-arrow">
                            </div>
                        </div>
                    </div>


                </div>
            </div>
